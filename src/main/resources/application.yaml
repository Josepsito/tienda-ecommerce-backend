spring:
  profiles:
    active: mysql
  datasource:
    url: jdbc:mysql://localhost:3306/tiendaDB?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: none # opciones: validate | update | create | create-drop
                     # USA CREATE_DROP PARA CREAR LAS TABLAS, PERO PRIMERO DEBES CREAR LA BASE DE DATOS
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

  # Configuración opcional para el pool de conexiones
  hikari:
    maximum-pool-size: 10
    minimum-idle: 5
    idle-timeout: 30000
    max-lifetime: 1800000

server:
  port: 8080
  servlet:
    context-path: /api/v1

jwt:
  secret: my-super-secret-key-my-super-secret-key
  expiration: 3600000

logging:
  level:
    org.springframework.security: DEBUG

